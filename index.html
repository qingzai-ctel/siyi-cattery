<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>思怡猫舍 | SIYI CATTERY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700&display=swap');
        
        :root {
            --bg: #FDFBF7; --text: #4A3728; --gold: #C5A059; --clay: #8E352E; --dark: #2D221B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Serif SC', serif; overflow-x: hidden; }

        /* 导航 */
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(253, 251, 247, 0.98); display: flex; justify-content: center; align-items: center; z-index: 1000; border-bottom: 1px solid rgba(197, 160, 89, 0.1); }
        nav a { margin: 0 15px; text-decoration: none; color: var(--text); font-size: 13px; letter-spacing: 1px; }

        /* --- 核心调整：首屏直接显示核心文案 --- */
        .hero { 
            height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('hero.jpg') center 20%/cover no-repeat; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: white; text-align: center; padding: 0 30px;
        }
        .hero h1 { font-size: 42px; letter-spacing: 8px; margin-bottom: 20px; text-shadow: 0 2px 15px rgba(0,0,0,0.5); }
        
        /* 首屏浮层文案 */
        .hero-text-box {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.3);
            max-width: 500px;
            border-radius: 4px;
        }
        .hero-text-box p { font-size: 15px; line-height: 1.8; margin-bottom: 10px; }
        .hero-text-box b { color: #f0d5a3; }

        /* 关于我们的详细故事 */
        .story-section { padding: 60px 25px; background: var(--bg); }
        .story-content { max-width: 800px; margin: 0 auto; line-height: 2.2; font-size: 16px; text-align: justify; }
        .story-content h2 { text-align: center; color: var(--clay); margin-bottom: 30px; letter-spacing: 4px; }
        .highlight-text { border-left: 3px solid var(--gold); padding-left: 15px; margin: 25px 0; color: var(--clay); font-weight: 500; }

        /* 关于我们图片（三只猫） */
        .about-img { width: 100%; max-width: 600px; margin: 40px auto; border: 1px solid var(--gold); padding: 8px; background: white; }
        .about-img img { width: 100%; display: block; }

        /* 岩彩 3D 轮播 */
        .gallery-box { padding: 60px 0; background: #F8F4EF; overflow: hidden; }
        .rock-slider { 
            display: flex; gap: 15px; padding: 40px 0; 
            overflow-x: auto; scroll-snap-type: x mandatory;
            align-items: center; scrollbar-width: none;
        }
        .rock-slider::-webkit-scrollbar { display: none; }
        .rock-item { 
            min-width: 180px; height: 300px; flex-shrink: 0;
            border: 6px solid white; outline: 1px solid var(--gold);
            scroll-snap-align: center; transition: all 0.5s ease;
            transform: scale(0.85); opacity: 0.5;
        }
        .rock-item img { width: 100%; height: 100%; object-fit: cover; }
        .rock-item.active { transform: scale(1.2); opacity: 1; z-index: 10; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

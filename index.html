<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>思怡猫舍 | SIYI CATTERY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700&display=swap');
        
        :root {
            --bg: #FDFBF7; --text: #4A3728; --gold: #C5A059; --clay: #8E352E; --dark: #2D221B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Serif SC', serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; line-height: 1.8; }

        /* 导航 */
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(253, 251, 247, 0.98); display: flex; justify-content: center; align-items: center; z-index: 1000; border-bottom: 1px solid rgba(197, 160, 89, 0.1); }
        nav a { margin: 0 15px; text-decoration: none; color: var(--text); font-size: 13px; letter-spacing: 1px; }

        /* 首屏 */
        .hero { height: 85vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('hero.jpg') center 20%/cover no-repeat; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 0 25px; }
        .hero h1 { font-size: clamp(36px, 10vw, 64px); letter-spacing: 8px; margin-bottom: 20px; text-shadow: 0 2px 15px rgba(0,0,0,0.5); }
        .hero-bio { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 20px; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; max-width: 450px; font-size: 14px; }

        /* 关于我们 - 承载长文案 */
        .section-title { text-align: center; font-size: 26px; letter-spacing: 4px; margin-bottom: 35px; color: var(--clay); }
        .about-wrap { padding: 60px 20px; max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .about-img { width: 100%; max-width: 650px; border: 1px solid var(--gold); padding: 10px; background: white; box-shadow: 15px 15px 0 rgba(197, 160, 89, 0.1); margin-bottom: 40px; }
        .about-img img { width: 100%; height: auto; display: block; }
        .about-text-content { text-align: justify; font-size: 15px; color: var(--text); }
